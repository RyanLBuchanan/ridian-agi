<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piper</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #faf6f1;
        color: #3b4252;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .hero {
        max-width: 520px;
      }
      h1 {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.6rem;
      }
      p {
        font-size: 1.05rem;
        color: #6b7a8d;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .cta {
        display: inline-block;
        padding: 0.85rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        border: none;
        border-radius: 12px;
        background: #c07878;
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .cta:hover {
        background: #a96060;
      }
      .cta:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Piper</h1>
      <p>
        An AI-powered learning companion that generates responsive,
        pedagogically grounded surfaces from natural-language intent.
      </p>
      <a href="/piper/genui/" class="cta">Try Piper GenUI</a>
    </div>
  </body>
</html>
